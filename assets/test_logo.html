<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { position: relative; width: 220px; height: 220px; background: #666; border: 1px solid #999; }
    img { width: 200px; height: 200px; margin: 10px; }
    .crosshair-h { position: absolute; top: 110px; left: 0; width: 220px; height: 1px; background: rgba(255,0,0,0.5); }
    .crosshair-h2 { position: absolute; top: 65px; left: 0; width: 220px; height: 1px; background: rgba(255,0,0,0.5); }
    .crosshair-h3 { position: absolute; top: 155px; left: 0; width: 220px; height: 1px; background: rgba(255,0,0,0.5); }
    .crosshair-v { position: absolute; left: 110px; top: 0; width: 1px; height: 220px; background: rgba(255,0,0,0.5); }
    .crosshair-v2 { position: absolute; left: 60px; top: 0; width: 1px; height: 220px; background: rgba(255,0,0,0.5); }
    .crosshair-v3 { position: absolute; left: 160px; top: 0; width: 1px; height: 220px; background: rgba(255,0,0,0.5); }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo-app.svg" />
    <div class="crosshair-h"></div>
    <div class="crosshair-h2"></div>
    <div class="crosshair-h3"></div>
    <div class="crosshair-v"></div>
    <div class="crosshair-v2"></div>
    <div class="crosshair-v3"></div>
  </div>
</body>
</html>
