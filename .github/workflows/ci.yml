name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup Node, install dependencies, and build the React app
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Build React App
        run: pnpm run build

      # 2. Install Rust toolchain and check src-tauri
      - name: Install Tauri OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Cargo Check & Clippy
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
          cargo check --manifest-path src-tauri/Cargo.toml

      # 3. Setup Go and run `go build` inside the `server/` directory
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: 'server/go.sum'

      - name: Build Go Server
        working-directory: ./server
        run: |
          go vet ./...
          go build -v -o privchat-signal
